<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#F6EFDC" />
<title>Exercise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root {
  --cream:   #F6EFDC;
  --cream-2: #EFE7CD;
  --ink:     #1B1A17;
  --ink-s:   #5C5849;
  --muted:   #8A8576;
  --line:    #1B1A17;
  --bg-in:   #FBF6E6;
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Atkinson Hyperlegible', ui-sans-serif, system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
.mono {
  font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  font-feature-settings: "tnum" 1;
}
button {
  font-family: inherit; font-size: inherit; color: inherit;
  background: none; border: 0; padding: 0; cursor: pointer;
}
input { font-family: inherit; color: inherit; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }

/* App shell */
.app {
  max-width: 480px; margin: 0 auto;
  min-height: 100dvh;
  padding-bottom: 88px;
  display: flex; flex-direction: column;
}
.app-head {
  padding: 14px 16px 6px;
  display: flex; align-items: center; justify-content: space-between;
}
.app-title { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
.app-main {
  flex: 1; padding: 6px 12px 24px;
  display: flex; flex-direction: column; gap: 10px;
}

/* Panel */
.panel { border: 1px solid var(--line); background: var(--cream); }
.panel-head {
  background: #C9542A;
  color: var(--cream);
  padding: 6px 10px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--line);
}
.panel-title { font-weight: 700; font-size: 12.5px; letter-spacing: 0.06em; text-transform: uppercase; }
.panel-back {
  display: inline-flex; align-items: center; gap: 4px;
  color: var(--cream); font-size: 11px; opacity: 0.9;
}
.panel-back:active { opacity: 0.65; }
.panel-body { padding: 10px; }

/* Buttons */
.btn { border: 1px solid var(--line); font-weight: 700; letter-spacing: 0.01em; background: var(--cream); }
.btn-primary { background: var(--ink); color: var(--cream); }
.btn-primary:active { background: #C9542A; }
.btn-md { padding: 9px 18px; font-size: 14px; }
.btn-disabled { opacity: 0.38; cursor: not-allowed; }
.form-actions { display: flex; justify-content: flex-end; margin-top: 10px; }

/* Date bar */
.datebar {
  display: flex; align-items: stretch;
  border: 1px solid var(--line); background: var(--cream);
}
.datebar-step {
  padding: 8px 14px;
  display: flex; align-items: center; justify-content: center;
  border-right: 1px solid var(--line);
}
.datebar-step:last-child { border-right: 0; border-left: 1px solid var(--line); }
.datebar-step:disabled { opacity: 0.22; }
.datebar-step:active:not(:disabled) { background: var(--cream-2); }
.datebar-label {
  flex: 1; text-align: center; padding: 6px 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
}
.datebar-day { font-size: 13px; font-weight: 500; }
.datebar-jump { font-size: 10px; color: var(--ink-s); text-decoration: underline; text-underline-offset: 2px; }

/* Totals bar */
.totals-bar { display: flex; border: 1px solid var(--line); background: var(--cream); }
.totals-cell {
  flex: 1; padding: 8px 6px;
  display: flex; flex-direction: column; align-items: center;
  border-right: 1px solid var(--line);
}
.totals-cell:last-child { border-right: 0; }
.totals-num { font-size: 22px; font-weight: 500; line-height: 1.1; }
.totals-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-s); margin-top: 2px; }

/* Segment control */
.segment { display: flex; border: 1px solid var(--line); }
.segment-btn {
  flex: 1; padding: 10px 0;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-weight: 500; font-size: 13px;
  border-right: 1px solid var(--line); background: var(--cream);
}
.segment-btn:last-child { border-right: 0; }
.segment-btn.active { background: var(--ink); color: var(--cream); }

/* Stopwatch */
.stopwatch { border: 1px solid var(--line); background: var(--cream-2); }
.sw-timers {
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--line);
}
.sw-cell {
  flex: 1; padding: 8px 6px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.sw-div { width: 1px; background: var(--line); }
.sw-lbl { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-s); margin-bottom: 2px; }
.sw-val { font-size: 20px; font-weight: 500; letter-spacing: 0.02em; }
.sw-active  { color: #C9542A; }
.sw-resting { color: #3A7D52; }
.sw-btns { display: flex; }
.sw-btn {
  flex: 1; padding: 9px 10px;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  font-size: 12.5px; font-weight: 600;
  border-right: 1px solid var(--line); background: var(--cream);
  letter-spacing: 0.01em;
}
.sw-btn:last-child { border-right: 0; }
.sw-btn:disabled { opacity: 0.28; cursor: not-allowed; }
.sw-start:active { background: var(--cream-2); }
.sw-stop  { background: var(--ink); color: var(--cream); }
.sw-stop:active { background: #C9542A; }
.sw-reset:active { background: var(--cream-2); }

/* Suggested session */
.suggested-list { display: flex; flex-direction: column; }
.sug-row {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  align-items: center; gap: 10px;
  padding: 9px 2px;
  border-bottom: 1px solid var(--cream-2);
  text-align: left; width: 100%; background: none;
}
.sug-row:last-child { border-bottom: 0; }
.sug-row:active { background: var(--cream-2); }
.sug-cat {
  font-size: 9.5px; font-weight: 600; letter-spacing: 0.06em;
  border: 1px solid; padding: 2px 3px; text-align: center;
}
.sug-name { font-size: 13.5px; font-weight: 500; }
.sug-ago  { font-size: 11px; color: var(--ink-s); }

/* Category groups (exercise list) */
.cat-group { border: 1px solid var(--line); }
.cat-header {
  padding: 5px 10px;
  color: var(--cream);
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em;
  border-bottom: 1px solid var(--line);
}
.exercise-btn {
  width: 100%; padding: 12px 10px 12px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--cream-2);
  background: var(--cream);
  border-left: 4px solid transparent;
  text-align: left;
}
.exercise-btn:last-child { border-bottom: 0; }
.exercise-btn:active { background: var(--cream-2); }
.ex-name { font-size: 14px; font-weight: 500; }
.ex-badges { display: flex; align-items: center; gap: 6px; }
.badge-tick {
  color: #3A7D52; font-weight: 700; font-size: 14px; line-height: 1;
}
.badge-count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 22px; height: 22px; padding: 0 5px;
  font-size: 11px; font-weight: 500;
  background: #C9542A; color: var(--cream);
}

/* Set table */
.set-table { border: 1px solid var(--line); margin-bottom: 8px; }
.set-row {
  display: grid;
  grid-template-columns: 32px 1fr 1fr 38px;
  align-items: stretch;
  border-bottom: 1px solid var(--line);
}
.set-row:last-child { border-bottom: 0; }
.set-row.reps-only { grid-template-columns: 32px 1fr 38px; }
.set-head { background: var(--cream-2); }
.set-idx {
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--ink-s);
  border-right: 1px solid var(--line);
}
.set-head .set-idx,
.set-head .set-kg,
.set-head .set-reps {
  padding: 6px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-s);
}
.set-head .set-kg,
.set-head .set-reps { display: flex; align-items: center; }
.set-del-h { }
.set-input {
  border: 0; border-right: 1px solid var(--line);
  background: var(--bg-in); padding: 10px 8px;
  font-size: 15px; width: 100%; text-align: center;
}
.set-input:focus { outline: 0; background: var(--cream); }
.set-del {
  display: flex; align-items: center; justify-content: center;
  background: var(--cream);
}
.set-del:disabled { opacity: 0.22; }
.set-del:active:not(:disabled) { background: var(--cream-2); }
.add-set {
  width: 100%; border: 1px dashed var(--line);
  padding: 9px; display: flex; align-items: center; justify-content: center; gap: 6px;
  font-size: 13px; color: var(--ink-s); background: transparent;
}
.add-set:active { background: var(--cream-2); }

/* Core circuit form */
.circuit-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
.circuit-field label {
  display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--ink-s); margin-bottom: 4px;
}

/* Cardio form */
.cardio-types {
  display: flex; border: 1px solid var(--line); margin-bottom: 10px;
}
.cardio-type {
  flex: 1; padding: 9px 4px; font-size: 12.5px; font-weight: 500;
  border-right: 1px solid var(--line); background: var(--cream); letter-spacing: 0.01em;
}
.cardio-type:last-child { border-right: 0; }
.cardio-type.active { background: var(--ink); color: var(--cream); }

.distance-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.distance-lbl {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-s);
  white-space: nowrap;
}
.dist-field { flex: 1; }

.cardio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cardio-input label {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--ink-s); margin-bottom: 4px;
}
.auto-tag {
  font-size: 9.5px; padding: 1px 5px;
  background: #C9542A; color: var(--cream);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.cardio-field {
  display: flex; align-items: stretch;
  border: 1px solid var(--line); background: var(--bg-in);
}
.cardio-field input {
  flex: 1; border: 0; background: transparent;
  padding: 10px; font-size: 16px; width: 100%;
}
.cardio-field input:focus { outline: 0; }
.cardio-field .unit {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 12px; color: var(--ink-s); padding: 0 10px;
  border-left: 1px solid var(--line);
  display: flex; align-items: center;
}

/* Today: strength groups */
.sg {
  border-bottom: 1px solid var(--cream-2);
  border-left: 4px solid transparent;
  padding: 8px 0 8px 8px;
}
.sg:first-child { padding-top: 4px; }
.sg:last-child  { border-bottom: 0; padding-bottom: 4px; }
.sg-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 3px;
}
.sg-name    { font-weight: 700; font-size: 14px; }
.sg-summary { font-size: 11px; color: var(--ink-s); }
.sg-circuit { font-size: 12px; color: var(--ink-s); margin-top: 2px; }
.sg-rows { display: flex; flex-direction: column; }
.sg-set {
  display: grid;
  grid-template-columns: 32px 60px 14px 1fr 28px;
  align-items: center; padding: 2px 0; font-size: 13px; gap: 3px;
}
.sg-idx { color: var(--ink-s); font-size: 11px; }
.sg-x   { color: var(--ink-s); text-align: center; }
.sg-r   { font-weight: 500; }
.sg-del {
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-s); padding: 4px;
}
.sg-del:active { color: #C9542A; }

/* Today: cardio rows */
.cr-list { display: flex; flex-direction: column; }
.cr-row {
  display: grid;
  grid-template-columns: 62px 1fr 52px 48px 52px 28px;
  align-items: center; padding: 6px 0;
  border-bottom: 1px solid var(--cream-2); font-size: 12.5px; gap: 3px;
}
.cr-row:last-child { border-bottom: 0; }
.cr-time { font-size: 11px; color: var(--ink-s); }
.cr-type { font-weight: 500; }
.cr-dist, .cr-dur, .cr-kcal { text-align: right; font-size: 12px; }
.cr-del {
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-s); padding: 4px;
}
.cr-del:active { color: #C9542A; }

/* Empty state */
.empty-state {
  border: 1px dashed var(--line); padding: 28px 12px;
  text-align: center; color: var(--ink-s); font-size: 13px;
}

/* Jiggle tab */
.jiggle-screen {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 40px 24px;
}

/* Bottom nav */
.bottom-nav {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: var(--cream); border-top: 1px solid var(--line);
  padding-bottom: env(safe-area-inset-bottom, 0); z-index: 50;
}
.bottom-nav-inner { max-width: 480px; margin: 0 auto; display: flex; }
.tab {
  flex: 1; padding: 10px 0 8px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  color: var(--ink-s);
}
.tab-active { color: #C9542A; }
.tab-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; }
</style>
